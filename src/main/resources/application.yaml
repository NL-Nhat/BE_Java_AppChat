
server:
  port: 8085

spring:

  application:
    name: chatMulticsat

  datasource:
    url: jdbc:sqlserver://DESKTOP-SQ4JIQD:1433;databaseName=chat_multicast;encrypt=true;trustServerCertificate=true
    username: sa
    password: 123456
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    
  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect

    hibernate:
      ddl-auto: none #Không làm gì với CSDL
      # ddl-auto: create #Xóa toàn bộ bảng cũ → tạo lại từ đầu, chỉ xóa các bảng có trong phần Entity
      # ddl-auto: update # Tự động cập nhật schema, Giữ dữ liệu cũ, Thêm cột mới, Thêm bảng mới, Không xóa cột/bảng cũ
      # ddl-auto: create-drop #Tạo bảng khi start, Xóa bảng khi stop

      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
